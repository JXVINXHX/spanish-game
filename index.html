<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learn Spanish Game</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1e2a44,#243b55);
color:white;
text-align:center;
padding:40px;
}

h1{font-size:40px;}

#level{font-size:22px;margin:10px;}

#stats{font-size:20px;margin:10px;}

#question{font-size:30px;margin:30px;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
max-width:520px;
margin:auto;
}

button{
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#4e73df;
color:white;
cursor:pointer;
}

#next{
margin-top:25px;
background:#1cc88a;
font-size:20px;
}

.correct{background:#1cc88a !important;}
.wrong{background:#e74a3b !important;}

</style>
</head>

<body>

<h1>Learn Spanish</h1>

<div id="level">Level 1</div>

<div id="stats">
Lives: ❤️❤️❤️❤️❤️ | Score: <span id="score">0</span>
</div>

<div id="question"></div>

<div class="grid">
<button class="option"></button>
<button class="option"></button>
<button class="option"></button>
<button class="option"></button>
</div>

<br>
<button id="next">Continue</button>

<script>

let lives=5
let score=0
let level=0
let questionIndex=0
let correctAnswer
let waiting=false

const question=document.getElementById("question")
const scoreText=document.getElementById("score")
const levelText=document.getElementById("level")
const buttons=document.querySelectorAll(".option")
const nextBtn=document.getElementById("next")

const levels=[

[
["Hola","Hello"],["Adiós","Goodbye"],["Gracias","Thank you"],["Agua","Water"],
["Comida","Food"],["Casa","House"],["Perro","Dog"],["Gato","Cat"],
["Libro","Book"],["Amigo","Friend"],["Escuela","School"],["Ciudad","City"],
["Familia","Family"],["Trabajo","Work"],["Calle","Street"],["Puerta","Door"],
["Ventana","Window"],["Mesa","Table"],["Silla","Chair"],["Tiempo","Time"]
],

[
["Buenos días","Good morning"],["Buenas noches","Good night"],
["¿Cómo estás?","How are you"],["Tengo hambre","I'm hungry"],
["Tengo sueño","I'm sleepy"],["Tengo frío","I'm cold"],
["Tengo calor","I'm hot"],["Hasta luego","See you later"],
["¿Cuánto cuesta?","How much is it"],["¿Dónde está el baño?","Where is the bathroom"],
["Estoy cansado","I'm tired"],["Estoy feliz","I'm happy"],
["Estoy triste","I'm sad"],["Estoy perdido","I'm lost"],
["Necesito ayuda","I need help"],["Vamos","Let's go"],
["Es fácil","It's easy"],["Es difícil","It's difficult"],
["Muy bien","Very good"],["Claro","Of course"]
],

[
["Aprender","To learn"],["Enseñar","To teach"],["Comprender","To understand"],
["Recordar","To remember"],["Olvidar","To forget"],["Intentar","To try"],
["Lograr","To achieve"],["Mejorar","To improve"],["Aumentar","To increase"],
["Reducir","To reduce"],["Explicar","To explain"],["Descubrir","To discover"],
["Construir","To build"],["Desarrollar","To develop"],["Elegir","To choose"],
["Crear","To create"],["Cambiar","To change"],["Resolver","To solve"],
["Avanzar","To advance"],["Proteger","To protect"]
],

[
["Conocimiento","Knowledge"],["Desafío","Challenge"],["Experiencia","Experience"],
["Responsabilidad","Responsibility"],["Compromiso","Commitment"],
["Capacidad","Ability"],["Oportunidad","Opportunity"],
["Importancia","Importance"],["Dificultad","Difficulty"],
["Libertad","Freedom"],["Confianza","Trust"],["Sabiduría","Wisdom"],
["Paciencia","Patience"],["Esfuerzo","Effort"],["Éxito","Success"],
["Fracaso","Failure"],["Realidad","Reality"],["Verdad","Truth"],
["Mentira","Lie"],["Justicia","Justice"]
],

[
["Extraordinario","Extraordinary"],["Impresionante","Impressive"],
["Increíble","Incredible"],["Sobresaliente","Outstanding"],
["Magnífico","Magnificent"],["Espectacular","Spectacular"],
["Fundamental","Fundamental"],["Esencial","Essential"],
["Complejidad","Complexity"],["Independencia","Independence"],
["Creatividad","Creativity"],["Determinación","Determination"],
["Perseverancia","Perseverance"],["Disciplina","Discipline"],
["Innovación","Innovation"],["Transformación","Transformation"],
["Productividad","Productivity"],["Eficiencia","Efficiency"],
["Competencia","Competition"],["Contribución","Contribution"]
]

]

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[array[i],array[j]]=[array[j],array[i]]
}
}

levels.forEach(shuffle)

function getOptions(correct){

let options=[correct]

while(options.length<4){

let randomLevel=levels[Math.floor(Math.random()*levels.length)]
let random=randomLevel[Math.floor(Math.random()*randomLevel.length)][1]

if(!options.includes(random)) options.push(random)

}

return options.sort(()=>Math.random()-0.5)

}

function newQuestion(){

if(lives<=0){
question.innerHTML="Game Over<br>Score: "+score
return
}

if(questionIndex>=levels[level].length){

level++
questionIndex=0

if(level>=levels.length){
question.innerHTML="You finished the game!<br>Score: "+score
return
}

levelText.innerText="Level "+(level+1)
}

waiting=false

let q=levels[level][questionIndex]

correctAnswer=q[1]

question.innerHTML="What does this mean?<br><b>"+q[0]+"</b>"

let options=getOptions(correctAnswer)

buttons.forEach((b,i)=>{
b.innerText=options[i]
b.disabled=false
b.classList.remove("correct","wrong")
})

}

buttons.forEach(b=>{

b.onclick=()=>{

if(waiting) return
waiting=true

if(b.innerText===correctAnswer){

score+=10
scoreText.innerText=score
b.classList.add("correct")

}else{

lives--
b.classList.add("wrong")

document.getElementById("stats").innerHTML=
"Lives: "+"❤️".repeat(lives)+" | Score: "+score
}

buttons.forEach(x=>x.disabled=true)

questionIndex++

}

})

nextBtn.onclick=newQuestion

newQuestion()

</script>

</body>
</html>
