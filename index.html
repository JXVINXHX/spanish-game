<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learn Spanish Game</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1e2a44,#243b55);
color:white;
text-align:center;
padding:40px;
}

h1{
font-size:40px;
}

#level{
font-size:22px;
margin:10px;
}

#stats{
font-size:20px;
margin:10px;
}

#question{
font-size:30px;
margin:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
max-width:520px;
margin:auto;
}

button{
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#4e73df;
color:white;
cursor:pointer;
}

button:hover{
background:#2e59d9;
}

#next{
margin-top:25px;
background:#1cc88a;
font-size:20px;
}

.correct{
background:#1cc88a !important;
}

.wrong{
background:#e74a3b !important;
}

</style>
</head>

<body>

<h1>Learn Spanish</h1>

<div id="level">Level 1</div>

<div id="stats">
Lives: ❤️❤️❤️❤️❤️ | Score: <span id="score">0</span>
</div>

<div id="question">Loading...</div>

<div class="grid">
<button class="option"></button>
<button class="option"></button>
<button class="option"></button>
<button class="option"></button>
</div>

<br>
<button id="next">Start</button>

<script>

let lives=5
let score=0
let level=1
let correctAnswer
let waitingNext=false

const scoreText=document.getElementById("score")
const question=document.getElementById("question")
const levelText=document.getElementById("level")
const buttons=document.querySelectorAll(".option")
const nextBtn=document.getElementById("next")

const levels=[

[
["Hola","Hello"],
["Adiós","Goodbye"],
["Gracias","Thank you"],
["Agua","Water"],
["Comida","Food"],
["Casa","House"],
["Perro","Dog"],
["Gato","Cat"],
["Libro","Book"],
["Amigo","Friend"],
["Escuela","School"],
["Ciudad","City"],
["Familia","Family"],
["Trabajo","Work"],
["Calle","Street"],
["Puerta","Door"],
["Ventana","Window"],
["Mesa","Table"],
["Silla","Chair"],
["Tiempo","Time"]
],

[
["Buenos días","Good morning"],
["Buenas noches","Good night"],
["¿Cómo estás?","How are you"],
["Tengo hambre","I'm hungry"],
["Tengo sueño","I'm sleepy"],
["Tengo frío","I'm cold"],
["Tengo calor","I'm hot"],
["Hasta luego","See you later"],
["¿Cuánto cuesta?","How much is it"],
["¿Dónde está el baño?","Where is the bathroom"],
["Estoy cansado","I'm tired"],
["Estoy feliz","I'm happy"],
["Estoy triste","I'm sad"],
["Estoy perdido","I'm lost"],
["Necesito ayuda","I need help"],
["Vamos","Let's go"],
["Es fácil","It's easy"],
["Es difícil","It's difficult"],
["Muy bien","Very good"],
["Claro","Of course"]
],

[
["Aprender","To learn"],
["Enseñar","To teach"],
["Comprender","To understand"],
["Recordar","To remember"],
["Olvidar","To forget"],
["Intentar","To try"],
["Lograr","To achieve"],
["Mejorar","To improve"],
["Aumentar","To increase"],
["Reducir","To reduce"],
["Explicar","To explain"],
["Descubrir","To discover"],
["Construir","To build"],
["Desarrollar","To develop"],
["Elegir","To choose"],
["Crear","To create"],
["Cambiar","To change"],
["Resolver","To solve"],
["Avanzar","To advance"],
["Proteger","To protect"]
],

[
["Conocimiento","Knowledge"],
["Desafío","Challenge"],
["Experiencia","Experience"],
["Responsabilidad","Responsibility"],
["Compromiso","Commitment"],
["Capacidad","Ability"],
["Oportunidad","Opportunity"],
["Importancia","Importance"],
["Dificultad","Difficulty"],
["Libertad","Freedom"],
["Confianza","Trust"],
["Sabiduría","Wisdom"],
["Paciencia","Patience"],
["Esfuerzo","Effort"],
["Éxito","Success"],
["Fracaso","Failure"],
["Realidad","Reality"],
["Verdad","Truth"],
["Mentira","Lie"],
["Justicia","Justice"]
],

[
["Extraordinario","Extraordinary"],
["Impresionante","Impressive"],
["Increíble","Incredible"],
["Sobresaliente","Outstanding"],
["Magnífico","Magnificent"],
["Espectacular","Spectacular"],
["Fundamental","Fundamental"],
["Esencial","Essential"],
["Complejidad","Complexity"],
["Independencia","Independence"],
["Creatividad","Creativity"],
["Determinación","Determination"],
["Perseverancia","Perseverance"],
["Disciplina","Discipline"],
["Innovación","Innovation"],
["Transformación","Transformation"],
["Productividad","Productivity"],
["Eficiencia","Efficiency"],
["Competencia","Competition"],
["Contribución","Contribution"]
]

]

function getRandomOptions(correct){

let options=[correct]

while(options.length<4){

let randomLevel=levels[Math.floor(Math.random()*levels.length)]

let random=randomLevel[Math.floor(Math.random()*randomLevel.length)][1]

if(!options.includes(random)) options.push(random)

}

return options.sort(()=>Math.random()-0.5)

}

function newQuestion(){

waitingNext=false
nextBtn.innerText="Waiting answer..."

let set=levels[level-1]

let random=set[Math.floor(Math.random()*set.length)]

question.innerHTML="What does this mean?<br><b>"+random[0]+"</b>"

correctAnswer=random[1]

let options=getRandomOptions(correctAnswer)

buttons.forEach((b,i)=>{
b.innerText=options[i]
b.classList.remove("correct","wrong")
b.disabled=false
})

}

buttons.forEach(b=>{

b.onclick=()=>{

if(waitingNext) return

waitingNext=true

if(b.innerText===correctAnswer){

score+=10
scoreText.innerText=score
b.classList.add("correct")

}else{

lives--
b.classList.add("wrong")

document.getElementById("stats").innerHTML=
"Lives: "+"❤️".repeat(lives)+" | Score: "+score

}

buttons.forEach(x=>x.disabled=true)

nextBtn.innerText="Continue"

if(score%100===0 && level<5){
level++
levelText.innerText="Level "+level
}

}

})

nextBtn.onclick=newQuestion

newQuestion()

</script>

</body>
</html>
